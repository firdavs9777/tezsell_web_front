  <!-- Theme no-flash script (runs before first paint) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("tz-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.classList.toggle("dark", t === "dark");
      } catch (e) {}
    })();
  </script>
